name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Repeat Runtime supervisor and chaos tests
        run: >-
          go test -race .
          -run '^(TestRuntimeChaosACKLossPreservesStableIDsAndExecutesOnce|TestRuntimeCapacityFourResumesFourAttemptsConcurrently|TestRuntimeTransportAutoConfirmsBeforeExecuteAndSwitchesWSPullWS|TestSwitchingRuntimeClientCancelsOldGenerationBeforePublishingNew)$'
          -count=5

      - name: Verify example module
        working-directory: example
        run: |
          go test ./...
          go vet ./...
