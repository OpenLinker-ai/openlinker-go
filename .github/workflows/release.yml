name: Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package-binaries:
    name: Package ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Package binary
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            version="sha-${GITHUB_SHA::12}"
          fi

          artifact_base="openlinker-a2a-grpc-conformance-${version}-${{ matrix.goos }}-${{ matrix.goarch }}"
          work_dir="${RUNNER_TEMP}/${artifact_base}"
          dist_dir="${GITHUB_WORKSPACE}/dist"
          mkdir -p "${work_dir}" "${dist_dir}"

          binary_name="openlinker-a2a-grpc-conformance"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            binary_name="${binary_name}.exe"
          fi

          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags="-s -w" -o "${work_dir}/${binary_name}" ./cmd/a2a-grpc-conformance

          cp README.md LICENSE "${work_dir}/" 2>/dev/null || true
          cp -R contracts "${work_dir}/contracts"

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            archive="${dist_dir}/${artifact_base}.zip"
            (cd "${RUNNER_TEMP}" && zip -qr "${archive}" "${artifact_base}")
          else
            archive="${dist_dir}/${artifact_base}.tar.gz"
            tar -C "${RUNNER_TEMP}" -czf "${archive}" "${artifact_base}"
          fi

          (cd "${dist_dir}" && sha256sum "$(basename "${archive}")" > "$(basename "${archive}").sha256")
          echo "artifact_base=${artifact_base}" >> "${GITHUB_OUTPUT}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact_base }}
          path: |
            dist/${{ steps.package.outputs.artifact_base }}.*
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish GitHub release artifacts
    if: github.ref_type == 'tag'
    needs: package-binaries
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --generate-notes
          fi
          gh release upload "${tag}" dist/* --clobber
